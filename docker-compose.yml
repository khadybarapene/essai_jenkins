version: '3.9'

services:

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: portfolioDB
    volumes:
      - mongo-data:/data/db
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Backend ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./portfolio-api
      dockerfile: Dockerfile
    container_name: portfolio-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/portfolioDB?authSource=admin
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy   # attend que Mongo soit prêt
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  react:
    build:
      context: ./React
      dockerfile: Dockerfile
    container_name: portfolio-react
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy   # attend que l'API soit prête
    networks:
      - portfolio-net

# ─── Volumes & réseau ─────────────────────────────────────────────────────────
volumes:
  mongo-data:

networks:
  portfolio-net:
    driver: bridge
